<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk Aplikasi - RunguAksara</title>
  <!-- Google Fonts: Fira Code & Fira Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Stylesheets -->
  <link href="tailwind.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body class="bg-[#F4F4F6] text-slate-800 font-sans min-h-screen flex items-center justify-center p-4 antialiased relative overflow-hidden select-none">

  <!-- Stunning Light Blue Glowing Background Blobs -->
  <div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[120px] pointer-events-none animate-pulse duration-5000"></div>
  <div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-[500px] h-[500px] bg-cyan-500/5 rounded-full blur-[120px] pointer-events-none animate-pulse duration-7000"></div>

  <!-- Decorative Grid Overlay -->
  <div class="absolute inset-0 bg-[linear-gradient(to_right,#cbd5e120_1px,transparent_1px),linear-gradient(to_bottom,#cbd5e120_1px,transparent_1px)] bg-[size:32px_32px] pointer-events-none"></div>

  <div class="w-full max-w-md bg-white/85 border border-slate-200/80 rounded-2xl p-8 md:p-10 shadow-[0_20px_50px_rgba(0,0,0,0.05)] backdrop-blur-2xl relative z-10 space-y-8 transition-all duration-300 hover:border-slate-300/80">
    
    <!-- Top Branding -->
    <div class="text-center space-y-4">
      <img src="runguaksara_logo.png" alt="RunguAksara Logo" class="h-16 w-16 rounded-xl mx-auto object-cover shadow-[0_8px_25px_rgba(62,106,225,0.15)] select-none">
      <div class="space-y-1">
        <h1 class="font-mono font-bold text-2xl tracking-tight text-[#121212]">RunguAksara</h1>
      </div>
    </div>

    <!-- Error Banner -->
    <div id="error-box" class="hidden flex items-start gap-3 p-4 rounded-xl bg-red-50 border border-red-200 text-red-700 text-xs transition-all duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <span id="error-message" class="font-medium">Username atau password salah.</span>
    </div>

    <!-- Success Box for registration -->
    <div id="success-box" class="hidden flex items-start gap-3 p-4 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-700 text-xs transition-all duration-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span id="success-message" class="font-medium">Pendaftaran berhasil! Silakan masuk.</span>
    </div>

    <!-- Login Form -->
    <form id="form-login" class="space-y-6">
      <!-- Username -->
      <div class="space-y-2">
        <label for="username" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Nama Pengguna</label>
        <div class="relative">
          <input type="text" id="username" required placeholder="admin" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-3 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3.5 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <label for="password" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Kata Sandi</label>
        <div class="relative">
          <input type="password" id="password" required placeholder="••••••••" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-3 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3.5 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Submit CTA -->
      <button type="submit" class="w-full py-3.5 bg-[#3E6AE1] hover:bg-[#2F5BD2] text-white font-semibold rounded-[4px] text-sm transition-all duration-200 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20 active:scale-[0.98] cursor-pointer">
        Masuk Aplikasi
      </button>
    </form>

    <!-- Register Form (Hidden by default) -->
    <form id="form-register" class="hidden space-y-5">
      <!-- Fullname -->
      <div class="space-y-1.5">
        <label for="reg-fullname" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Nama Lengkap</label>
        <div class="relative">
          <input type="text" id="reg-fullname" placeholder="Nama lengkap Anda" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-2.5 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Email -->
      <div class="space-y-1.5">
        <label for="reg-email" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Alamat Email</label>
        <div class="relative">
          <input type="email" id="reg-email" placeholder="nama@email.com" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-2.5 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Username -->
      <div class="space-y-1.5">
        <label for="reg-username" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Nama Pengguna</label>
        <div class="relative">
          <input type="text" id="reg-username" placeholder="Buat username baru" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-2.5 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-1.5">
        <label for="reg-password" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Kata Sandi</label>
        <div class="relative">
          <input type="password" id="reg-password" placeholder="Minimal 6 karakter" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-2.5 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="space-y-1.5">
        <label for="reg-confirm-password" class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest block">Konfirmasi Kata Sandi</label>
        <div class="relative">
          <input type="password" id="reg-confirm-password" placeholder="Ulangi kata sandi" class="w-full bg-white border border-slate-200 focus:border-[#3E6AE1] focus:ring-4 focus:ring-[#3E6AE1]/5 focus:outline-none rounded-[4px] px-4 py-2.5 pl-11 text-sm text-slate-800 placeholder-slate-400 transition-all duration-200">
          <div class="absolute left-4 top-3 text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
          </div>
        </div>
      </div>

      <!-- Register CTA -->
      <button type="submit" class="w-full py-3.5 bg-[#3E6AE1] hover:bg-[#2F5BD2] text-white font-semibold rounded-[4px] text-sm transition-all duration-200 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20 active:scale-[0.98] cursor-pointer">
        Daftar Akun
      </button>
    </form>

    <!-- Toggle Mode Link -->
    <div class="text-center pt-2">
      <span class="text-xs text-slate-500 font-light select-none">
        <span id="toggle-text">Belum punya akun?</span>
        <a href="#" id="btn-toggle-mode" class="text-[#3E6AE1] font-semibold hover:underline">Daftar sekarang</a>
      </span>
    </div>

  </div>

  <script>
    const formLogin = document.getElementById('form-login');
    const formRegister = document.getElementById('form-register');
    const errorBox = document.getElementById('error-box');
    const errorMessage = document.getElementById('error-message');
    const successBox = document.getElementById('success-box');
    const successMessage = document.getElementById('success-message');
    const btnToggleMode = document.getElementById('btn-toggle-mode');
    const toggleText = document.getElementById('toggle-text');
    const titlePage = document.querySelector('title');

    let currentMode = 'login'; // 'login' or 'register'

    // Toggle Mode
    btnToggleMode.addEventListener('click', (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');

      if (currentMode === 'login') {
        currentMode = 'register';
        formLogin.classList.add('hidden');
        formRegister.classList.remove('hidden');
        titlePage.textContent = 'Daftar Akun - RunguAksara';
        toggleText.textContent = 'Sudah punya akun?';
        btnToggleMode.textContent = 'Masuk sekarang';
      } else {
        currentMode = 'login';
        formRegister.classList.add('hidden');
        formLogin.classList.remove('hidden');
        titlePage.textContent = 'Masuk Aplikasi - RunguAksara';
        toggleText.textContent = 'Belum punya akun?';
        btnToggleMode.textContent = 'Daftar sekarang';
      }
    });

    // Handle Login
    formLogin.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (res.ok) {
          window.location.href = '/index.html';
        } else {
          const data = await res.json();
          errorMessage.textContent = data.error || 'Login gagal.';
          errorBox.classList.remove('hidden');
        }
      } catch (err) {
        errorMessage.textContent = 'Terjadi kesalahan koneksi jaringan.';
        errorBox.classList.remove('hidden');
      }
    });

    // Handle Register
    formRegister.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');
      successBox.classList.add('hidden');

      const fullname = document.getElementById('reg-fullname').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm-password').value;

      if (!fullname || !email || !username || !password || !confirmPassword) {
        errorMessage.textContent = 'Semua kolom wajib diisi.';
        errorBox.classList.remove('hidden');
        return;
      }

      if (password !== confirmPassword) {
        errorMessage.textContent = 'Konfirmasi kata sandi tidak cocok.';
        errorBox.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullname, email, username, password })
        });

        const data = await res.json();
        if (res.ok) {
          formRegister.reset();
          successMessage.textContent = data.message || 'Registrasi berhasil. Silakan masuk.';
          successBox.classList.remove('hidden');
          // Auto switch to login
          setTimeout(() => {
            btnToggleMode.click();
          }, 1500);
        } else {
          errorMessage.textContent = data.error || 'Registrasi gagal.';
          errorBox.classList.remove('hidden');
        }
      } catch (err) {
        errorMessage.textContent = 'Terjadi kesalahan koneksi jaringan.';
        errorBox.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
